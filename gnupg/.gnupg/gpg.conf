# Algorithm preferences (prefer strong, modern algorithms)
personal-digest-preferences SHA512 SHA384 SHA256
personal-cipher-preferences AES256 AES192 AES
default-preference-list SHA512 SHA384 SHA256 AES256 AES192 AES ZLIB ZIP Uncompressed
cert-digest-algo SHA512

# Keyserver
keyserver hkps://keys.openpgp.org
keyserver-options auto-key-retrieve

# Display preferences
keyid-format 0xlong
with-fingerprint

# Disable version in output
no-emit-version

# Disable comment string in signatures
no-comments

# Show UID validity in key listings
list-options show-uid-validity
verify-options show-uid-validity
