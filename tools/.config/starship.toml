# Starship prompt configuration
# https://starship.rs/config/

command_timeout = 1000
add_newline = true

# Two-line prompt: context on line 1, input on line 2
format = """
$username$hostname$directory$git_branch$git_status$fill$all$line_break\
$character"""

# Right prompt: command duration (keeps left side clean)
right_format = "$cmd_duration"

[fill]
symbol = " "

[character]
success_symbol = "[>](bold green)"
error_symbol = "[>](bold red)"

# Show username always (not only for SSH or root)
[username]
show_always = true
format = "[$user]($style)@"

# Show hostname always (not only on SSH)
[hostname]
ssh_only = false
format = "[$hostname]($style):"

[directory]
truncation_length = 4
truncate_to_repo = true
# Highlight repo name in path
repo_root_style = "bold cyan"
repo_root_format = "[$before_root_path]($before_repo_root_style)[$repo_root]($repo_root_style)[$path]($style)[$read_only]($read_only_style) "

[git_branch]
symbol = ""
format = "[$symbol$branch(:$remote_branch)]($style) "

[git_status]
format = '([\[$all_status$ahead_behind\]]($style) )'
# Show count for actionable items
ahead = ">"
behind = "<"
diverged = "<>"
conflicted = "!"
modified = "~"
untracked = "?"
staged = "+"
stashed = "*"

[status]
disabled = false
format = '[\[$symbol$common_meaning$signal_name$maybe_int\]]($style) '
map_symbol = true

[cmd_duration]
min_time = 2000
format = "[$duration]($style)"

# -- Languages (shown only when project detected) --

[python]
format = '[py $version( \($virtualenv\))]($style) '
detect_extensions = []  # avoid false positives on random .py files

[nodejs]
format = '[node $version]($style) '
detect_files = ["package.json", ".node-version", ".nvmrc"]
detect_extensions = []  # skip detection by .js/.mjs alone

[rust]
format = '[rs $version]($style) '

[golang]
format = '[go $version]($style) '

[java]
format = '[java $version]($style) '
detect_files = ["pom.xml", "build.gradle", "build.gradle.kts", ".java-version"]

# -- Infra/Cloud (only when context is active) --

[kubernetes]
disabled = false
format = '[k8s $context(/$namespace)]($style) '
# Show only when explicitly set (avoids clutter for local dev)
detect_files = []
detect_folders = []

[aws]
format = '[aws $profile( $region)]($style) '

[azure]
disabled = false
format = '[az $subscription]($style) '

[terraform]
format = '[tf $version $workspace]($style) '

[docker_context]
format = '[docker $context]($style) '
# Only show non-default contexts
only_with_files = false

[conda]
format = '[conda $environment]($style) '

# -- Disabled (noisy or slow) --

[package]
disabled = true

[line_break]
disabled = false
