# General settings
save-position-on-quit
hwdec=auto

# Subtitles
sub-auto=fuzzy
slang=fr,fre,es,spa,en,eng

# Audio
alang=fr,fre,es,spa,en,eng
audio-channels=stereo
audio-file-auto=fuzzy
audio-pitch-correction=yes
volume-max=200

# Video quality
scale=ewa_lanczossharp
cscale=ewa_lanczossharp

# GPU
gpu-api=auto

# macOS-specific
[macos]
profile-cond=string.match(mp.get_property("platform"), "darwin") ~= nil
no-native-fs

# Linux-specific (prefer vaapi on Intel/AMD)
[linux]
profile-cond=string.match(mp.get_property("platform"), "linux") ~= nil
